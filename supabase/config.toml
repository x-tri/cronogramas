# Supabase project config — overrides per-function defaults.
#
# submit-simulado: verify_jwt=false porque o Supabase migrou o formato das
# anon keys para ES256 (assimétrico), mas o gateway padrão só valida HS256
# e rejeita antes do handler com UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM.
# A função tem validação JWT interna (auth.getUser(jwt) no index.ts),
# então é seguro desativar o gate do gateway.
[functions.submit-simulado]
verify_jwt = false

# get-student-performance: verify_jwt=false pelo mesmo motivo do submit-simulado.
# Server-to-server calls de mentor-gap-analysis com service_role JWT eram
# rejeitadas pelo gateway antes do handler. A função tem verificação interna:
# (assertCanReadStudent) que:
#   - Aceita X-Internal-Function-Secret para chamadas internas
#   - Ou exige user JWT cujo sub == students.profile_id
[functions.get-student-performance]
verify_jwt = false

# get-executive-legacy-metrics: verify_jwt=false pelo mesmo motivo dos fluxos
# acima. A função valida internamente o Authorization no PRIMARY e consulta o
# LEGACY com service_role server-side, sem depender de sessão duplicada no browser.
[functions.get-executive-legacy-metrics]
verify_jwt = false

# Fonte LEGACY chamada apenas pela função PRIMARY acima via segredo interno.
# Também usa validação interna porque o gateway rejeita chaves ES256 antes do handler.
[functions.get-executive-legacy-metrics-source]
verify_jwt = false
